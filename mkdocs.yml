site_name: rapidtextprep
site_description: Fast pandas-friendly text preprocessing utilities.
site_url: https://suraj-yadav-aiml.github.io/rapidtextprep/
repo_url: https://github.com/suraj-yadav-aiml/rapidtextprep
repo_name: suraj-yadav-aiml/rapidtextprep

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - User Guide: user-guide.md
  - Function Reference:
      - Overview: function-reference.md
      - Normalization: functions/normalization.md
      - Cleaning: functions/cleaning.md
      - Stopwords: functions/stopwords.md
      - Extraction: functions/extraction.md
      - Features: functions/features.md
      - Frequency Utilities: functions/frequency.md
      - Lemmatization: functions/lemmatization.md
      - Pipeline: functions/pipeline.md
      - Configuration: functions/configuration.md
      - scikit-learn Transformer: functions/transformers.md
  - scikit-learn Pipeline: sklearn-pipeline.md
  - Parallel Processing: parallel-processing.md
  - API Reference: api-reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
